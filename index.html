<script>

let music = document.getElementById("bg-music");
let button = document.getElementById("music-btn");

function toggleMusic(){

    if(music.paused){
        music.play();
        button.innerHTML = "🔊 Music ON";
    }

    else{
        music.pause();
        button.innerHTML = "🔇 Music OFF";
    }

}

</script>
</body>
    <audio id="bg-music" loop>
    <source src="gta-music.mp3" type="audio/mp3">
</audio>

<button id="music-btn" onclick="toggleMusic()">
