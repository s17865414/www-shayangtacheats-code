<!DOCTYPE html>
<html>
<head>

<title>The Shayan GTA Game Cheat Codes</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding-top:150px;
}

h1{
font-size:50px;
color:cyan;
}

button{
padding:15px 35px;
font-size:22px;
background:orange;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#music-btn{
position:fixed;
top:20px;
right:20px;
padding:12px 20px;
font-size:18px;
background:#ff9800;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>The Shayan GTA Game Cheat Codes</h1>

<a href="codes.html">
<button>View Cheat Codes</button>
</a>

<br>

<audio id="bg-music">
<source src="gta-music.mp3" type="audio/mp3">
</audio>

<button id="music-btn">🔊 Play Music</button>

<script>

const music = document.getElementById("bg-music");
const musicBtn = document.getElementById("music-btn");

let isPlaying = false;

musicBtn.addEventListener("click", function(){

if(isPlaying){
music.pause();
musicBtn.innerHTML = "🔊 Play Music";
}

else{
music.play();
musicBtn.innerHTML = "🔇 Stop Music";
}

isPlaying = !isPlaying;

});

</script>

</body>
</html>
